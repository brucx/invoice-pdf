<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice PDF — Free Invoice Generator</title>
  <meta name="description" content="Create and download professional invoice PDFs in seconds. Free, no sign-up, runs entirely in your browser — your data never leaves your device." />
  <link rel="canonical" href="https://invoices-generator.net/" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://invoices-generator.net/" />
  <meta property="og:site_name" content="Invoice PDF" />
  <meta property="og:title" content="Invoice PDF — Free Invoice Generator" />
  <meta property="og:description" content="Create and download professional invoice PDFs in seconds. Free, no sign-up, your data never leaves your device." />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Invoice PDF — Free Invoice Generator" />
  <meta name="twitter:description" content="Create and download professional invoice PDFs in seconds. Free, no sign-up, your data never leaves your device." />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Invoice PDF",
    "url": "https://invoices-generator.net/",
    "description": "Free in-browser invoice PDF generator. No sign-up, no server — data never leaves your device.",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path fill="currentColor" d="M6 2a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6H6zm7 1.5L18.5 9H13V3.5zM8 12h8v1.5H8V12zm0 3.5h8V17H8v-1.5z"/>
      </svg>
      <span class="brand-name">Invoice&nbsp;PDF</span>
      <span class="brand-tag">free · private · in-browser</span>
    </div>
    <div class="topbar-actions">
      <button id="btn-reset" class="btn btn-ghost" type="button">Reset</button>
      <button id="btn-download" class="btn btn-primary" type="button">Download PDF</button>
    </div>
  </header>

  <main class="layout">
    <form id="invoice-form" class="panel form-panel" autocomplete="off">
      <section class="card">
        <h2 class="card-title">Invoice details</h2>
        <div class="grid-3">
          <label class="field">
            <span>Invoice #</span>
            <input type="text" name="number" placeholder="INV-0001" />
          </label>
          <label class="field">
            <span>Issue date</span>
            <input type="date" name="issueDate" />
          </label>
          <label class="field">
            <span>Due date</span>
            <input type="date" name="dueDate" />
          </label>
        </div>
        <div class="grid-3">
          <label class="field">
            <span>Currency</span>
            <select name="currency">
              <option value="USD">USD — $</option>
              <option value="EUR">EUR — €</option>
              <option value="GBP">GBP — £</option>
              <option value="CNY">CNY — ¥</option>
              <option value="JPY">JPY — ¥</option>
              <option value="AUD">AUD — $</option>
              <option value="CAD">CAD — $</option>
              <option value="INR">INR — ₹</option>
            </select>
          </label>
          <label class="field">
            <span>Tax rate (%)</span>
            <input type="number" name="taxRate" min="0" max="100" step="0.01" placeholder="0" />
          </label>
          <label class="field">
            <span>Discount (%)</span>
            <input type="number" name="discount" min="0" max="100" step="0.01" placeholder="0" />
          </label>
        </div>
      </section>

      <div class="grid-2">
        <section class="card">
          <h2 class="card-title">From</h2>
          <label class="field">
            <span>Name / Company</span>
            <input type="text" name="fromName" placeholder="Acme Inc." />
          </label>
          <label class="field">
            <span>Address &amp; contact</span>
            <textarea name="fromDetails" rows="4" placeholder="123 Main St&#10;San Francisco, CA 94105&#10;billing@acme.com"></textarea>
          </label>
        </section>

        <section class="card">
          <h2 class="card-title">Bill to</h2>
          <label class="field">
            <span>Name / Company</span>
            <input type="text" name="toName" placeholder="Client LLC" />
          </label>
          <label class="field">
            <span>Address &amp; contact</span>
            <textarea name="toDetails" rows="4" placeholder="456 Market St&#10;New York, NY 10001&#10;ap@client.com"></textarea>
          </label>
        </section>
      </div>

      <section class="card">
        <h2 class="card-title">Items</h2>
        <div class="items-head">
          <span>Description</span><span>Qty</span><span>Unit price</span><span>Amount</span><span></span>
        </div>
        <div id="items-list"></div>
        <button id="btn-add-item" class="btn btn-ghost btn-add" type="button">+ Add item</button>
      </section>

      <section class="card">
        <h2 class="card-title">Notes</h2>
        <label class="field">
          <textarea name="notes" rows="3" placeholder="Payment terms, bank details, thank-you note…"></textarea>
        </label>
      </section>
    </form>

    <aside class="panel preview-panel">
      <div id="preview" class="paper" aria-label="Invoice preview"></div>
    </aside>
  </main>

  <footer class="footer">
    <p>Runs 100% in your browser — nothing is uploaded, your data stays on your device.</p>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
